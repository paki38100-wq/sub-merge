name: smart-subscription

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build subscription
        run: |
          mkdir -p output

          while read url; do
            curl -s --max-time 15 "$url" >> output/sub.txt
            echo "" >> output/sub.txt
          done < sources.txt

          sort output/sub.txt | uniq > sub.txt

      - name: Commit file
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add sub.txt
          git commit -m "update sub" || echo "no changes"
          git push
