name: merge-subscriptions

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download and merge subscriptions
        run: |
          > sub.txt

          while read url; do
            echo "Fetching $url"
            curl -s --max-time 15 "$url" >> sub.txt
            echo "" >> sub.txt
          done < sources.txt

      - name: Clean duplicates
        run: |
          sort sub.txt | uniq > tmp.txt
          mv tmp.txt sub.txt

      - name: Commit sub.txt to repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add sub.txt
          git commit -m "update sub.txt" || echo "no changes"
          git push
          git push
