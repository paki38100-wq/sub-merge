name: smart-subscription

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download + Clean
        run: |
          mkdir output
          touch output/raw.txt

          while read url; do
            curl -s --max-time 15 "$url" >> output/raw.txt
            echo "" >> output/raw.txt
          done < sources.txt

          sort output/raw.txt | uniq > sub.txt

      - name: Commit to repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add sub.txt
          git commit -m "update sub" || echo "no changes"
          git push          git push        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add sub.txt
          git commit -m "update subscription" || echo "no changes"
          git push          cat output/sub.txt >> output/link.txt

      - name: Upload subscription
        uses: actions/upload-artifact@v4
        with:
          name: subscription
          path: output/link.txt
