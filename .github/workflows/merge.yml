name: smart-subscription

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build subscription
        run: |
          mkdir dist
          touch dist/sub.txt

          while read url; do
            curl -s --max-time 15 "$url" >> dist/sub.txt
            echo "" >> dist/sub.txt
          done < sources.txt

          sort dist/sub.txt | uniq > dist/final.txt

          mv dist/final.txt dist/index.txt

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4          git push          git push        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add sub.txt
          git commit -m "update subscription" || echo "no changes"
          git push          cat output/sub.txt >> output/link.txt

      - name: Upload subscription
        uses: actions/upload-artifact@v4
        with:
          name: subscription
          path: output/link.txt
